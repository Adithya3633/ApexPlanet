<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Expense Tracker</h1>
        
        <div class="balance-container">
            <h2>Your Balance</h2>
            <div class="balance" id="balance">$0.00</div>
            
            <div class="income-expense">
                <div class="income">
                    <h3>Income</h3>
                    <p class="money plus" id="income">$0.00</p>
                </div>
                <div class="expense">
                    <h3>Expense</h3>
                    <p class="money minus" id="expense">$0.00</p>
                </div>
            </div>
        </div>

        <div class="currency-container">
            <h3>Currency Settings</h3>
            <div class="form-control">
                <label for="currency-select">Select Currency</label>
                <select id="currency-select" class="currency-select">
                    <option value="USD">USD - US Dollar</option>
                    <option value="EUR">EUR - Euro</option>
                    <option value="GBP">GBP - British Pound</option>
                    <option value="JPY">JPY - Japanese Yen</option>
                    <option value="CAD">CAD - Canadian Dollar</option>
                    <option value="AUD">AUD - Australian Dollar</option>
                    <option value="CHF">CHF - Swiss Franc</option>
                    <option value="CNY">CNY - Chinese Yuan</option>
                    <option value="INR">INR - Indian Rupee</option>
                    <option value="BRL">BRL - Brazilian Real</option>
                    <option value="MXN">MXN - Mexican Peso</option>
                    <option value="KRW">KRW - South Korean Won</option>
                    <option value="SGD">SGD - Singapore Dollar</option>
                    <option value="NZD">NZD - New Zealand Dollar</option>
                    <option value="SEK">SEK - Swedish Krona</option>
                    <option value="NOK">NOK - Norwegian Krone</option>
                    <option value="DKK">DKK - Danish Krone</option>
                    <option value="PLN">PLN - Polish Złoty</option>
                    <option value="CZK">CZK - Czech Koruna</option>
                </select>
            </div>
        </div>

        <div class="transaction-container">
            <h3>Add New Transaction</h3>
            <form id="form">
                <div class="form-control">
                    <label for="description">Description</label>
                    <input type="text" id="description" placeholder="Enter description..." required>
                </div>
                <div class="form-control">
                    <label for="amount">Amount</label>
                    <input type="number" id="amount" placeholder="Enter amount..." required>
                    <small>Use positive for income, negative for expense</small>
                </div>
                <button class="btn" type="submit">Add Transaction</button>
            </form>
        </div>

        <div class="history-container">
            <h3>Transaction History</h3>
            <ul id="transaction-list" class="transaction-list">
            </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
